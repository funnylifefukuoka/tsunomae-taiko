<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たいこのれんしゅう</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        /* タイトル・難易度画面・楽譜閲覧画面の共通スタイル */
        .screen-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }
        .menu-title {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 2px 2px 4px #ff3300;
        }
        .menu-subtitle {
            font-size: 20px;
            margin-bottom: 20px;
            color: #fff;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 15px;
        }
        .diff-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }
        .btn-all-container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr;
            }
            .menu-title { font-size: 28px; }
        }
        .menu-btn {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .btn-p1 { background-color: #e63946; }
        .btn-p2 { background-color: #457b9d; }
        .btn-p3 { background-color: #2a9d8f; }
        .btn-all { background-color: #8338ec; width: 100%; box-sizing: border-box; }
        .btn-view-score { background-color: #f1a7a6; color: #111; border-color: #111; }

        /* 難易度ボタンの色 */
        .btn-easy { background-color: #2a9d8f; }
        .btn-normal { background-color: #f4a261; }
        .btn-oni { background-color: #d90429; }

        /* 楽譜だけ見る画面用の追加スタイル */
        #scoreViewerScreen {
            display: none;
            padding-top: 40px;
            padding-bottom: 40px;
        }
        .score-list-container {
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 30px;
        }
        .score-view-item {
            background-color: #111;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
        }
        .score-view-item h4 {
            margin: 0 0 10px 0;
            color: #ffcc00;
            font-size: 18px;
        }
        .score-view-item img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }

        /* ゲーム画面全体のフレックス構成（最初は非表示） */
        #gameScreen {
            display: none;
            box-sizing: border-box;
            height: 100vh;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
        }
        
        /* ゲーム情報エリア */
        .game-header-area {
            flex-shrink: 0;
        }
        #playing-title {
            font-size: 16px;
            margin: 2px 0;
            color: #ffcc00;
        }
        .hud-container {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
            font-size: 15px;
            font-weight: bold;
        }
        .hud-score { color: #ffcc00; }
        .hud-combo { color: #00ffcc; }
        #mode-instruction {
            font-size: 11px;
            margin: 1px 0;
            color: #aaa;
        }
        .top-controls {
            margin: 2px 0;
        }
        .control-btn {
            padding: 4px 12px;
            font-size: 12px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        /* 1. 一番上：流れる譜面（キャンバス） */
        #gameCanvas {
            background: #111;
            display: block;
            margin: 2px auto;
            border: 2px solid #fff;
            max-width: 100%;
            width: 95%;
            max-height: 20vh;
            height: auto;
            flex-shrink: 0;
        }

        /* 2. 真ん中：楽譜 */
        .score-image-container {
            margin: 2px auto;
            max-width: 95%;
            width: 600px;
            background-color: #111;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 4px;
            box-sizing: border-box;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .score-image-container h3 {
            margin: 0 0 2px 0;
            font-size: 12px;
            color: #ffcc00;
            flex-shrink: 0;
        }
        .score-img-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .score-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 4px;
        }
        
        /* 3. 一番下：「ドン」「カ」の太鼓叩きボタン一式 */
        .btn-container {
            display: flex;
            justify-content: space-between; /* 左右にめいっぱい広げる */
            align-items: center;
            box-sizing: border-box;
            width: 100%;
            max-width: 500px; /* スマホで親指が届きやすい適度な横幅 */
            margin: 8px auto;
            padding: 0 15px; /* 画面端の余白 */
            flex-shrink: 0;
        }
        .drum-btn {
            border-radius: 50%;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* スマホのズームやスクロールによる遅延を完全にシャットアウト */
            transition: background-color 0.05s, filter 0.05s;
        }
        
        .btn-ka-side { 
            background-color: #1d6fa5; 
            width: 70px; /* 少し押しやすく大きく */
            height: 70px;
            font-size: 16px;
            border: 2px solid #fff;
        }
        .btn-ka-side.active-flash {
            background-color: #00bfff !important;
            filter: brightness(1.4);
            box-shadow: 0 0 15px #00bfff;
        }

        .split-don-container {
            width: 130px; /* 少し大きく */
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            border: 3px solid #fff;
            box-sizing: border-box;
            position: relative;
            touch-action: none;
        }
        .don-half {
            width: 50%;
            height: 100%;
            background-color: #b32d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background-color 0.05s, filter 0.05s;
        }
        #don-left.active-flash {
            background-color: #ff6666 !important;
            filter: brightness(1.4);
            box-shadow: inset -5px 0 15px rgba(255,255,255,0.6), 0 0 15px #ff4d4d;
        }
        #don-right.active-flash {
            background-color: #ff6666 !important;
            filter: brightness(1.4);
            box-shadow: inset 5px 0 15px rgba(255,255,255,0.6), 0 0 15px #ff4d4d;
        }

        /* リザルト画面のスタイル */
        #resultScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }
        .result-box {
            background-color: #111;
            border: 3px solid #ffcc00;
            border-radius: 15px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        .result-rank {
            font-size: 26px;
            color: #ff0054;
            font-weight: bold;
            margin: 10px 0;
        }
        .result-score {
            font-size: 32px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .result-details {
            font-size: 16px;
            text-align: left;
            margin: 0 auto 15px auto;
            max-width: 260px;
            line-height: 1.5;
        }
        .details-row {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="titleScreen" class="screen-container">
        <div class="menu-title">たいこれんしゅう</div>
        <div class="menu-container">
            <button class="menu-btn btn-p1" onclick="selectPart('p1')">パート 1</button>
            <button class="menu-btn btn-p2" onclick="selectPart('p2')">パート 2</button>
            <button class="menu-btn btn-p3" onclick="selectPart('p3')">パート 3</button>
        </div>
        <div class="btn-all-container">
            <button class="menu-btn btn-all" onclick="selectPart('all')">ぜんぶ通し練習</button>
            <button class="menu-btn btn-view-score" onclick="openScoreViewer()">📄 楽譜を見る（確認用）</button>
        </div>
    </div>

    <div id="scoreViewerScreen" class="screen-container">
        <div class="menu-title">お囃子の楽譜一覧</div>
        <div class="score-list-container">
            <div class="score-view-item">
                <h4>【 パート 1 - 大太鼓 】</h4>
                <img src="score1.jpg" alt="楽譜1">
            </div>
            <div class="score-view-item">
                <h4>【 パート 2 - 芸・ほい(中) / 遊び 】</h4>
                <img src="score2.jpg" alt="楽譜2">
            </div>
            <div class="score-view-item">
                <h4>【 パート 3 - 芸・ほい(外) / 終り 】</h4>
                <img src="score3.jpg" alt="楽譜3">
            </div>
        </div>
        <button class="menu-btn" style="background-color: #555; max-width: 400px; width: 100%;" onclick="closeScoreViewer()">タイトルメニューにもどる</button>
    </div>

    <div id="difficultyScreen" class="screen-container" style="display: none;">
        <div class="menu-title">むずかしさをえらぶ</div>
        <div id="selected-part-name" class="menu-subtitle">選択中のパート</div>
        <div class="diff-container">
            <button class="menu-btn btn-easy" onclick="selectDifficulty('easy')">かんたん (ゆっくり)</button>
            <button class="menu-btn btn-normal" onclick="selectDifficulty('normal')">ふつう</button>
            <button class="menu-btn btn-oni" onclick="selectDifficulty('oni')">おに (超絶はやい！)</button>
            <button class="menu-btn" style="background-color: #555; margin-top: 10px;" onclick="backToPartSelect()">パートをえらびなおす</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="game-header-area">
            <h1 id="playing-title">たいコのれんしゅう</h1>
            <div class="hud-container">
                <div class="hud-score">スコア: <span id="live-score">0</span></div>
                <div class="hud-combo"><span id="live-combo">0</span> コンボ</div>
            </div>
            <p id="mode-instruction">左手 [ D:カ / F:ドン ] ｜ 右手 [ J:ドン / K:カ ]</p>
            <div class="top-controls">
                <button class="control-btn" onclick="backToTitle()">タイトルにもどる</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="280"></canvas>

        <div class="score-image-container">
            <h3 id="score-title">お囃子の楽譜</h3>
            <div class="score-img-wrapper">
                <img id="score-view-img" class="score-img" src="score1.jpg" alt="楽譜画像">
            </div>
        </div>

        <div class="btn-container">
            <button id="btn-ka-left" class="drum-btn btn-ka-side">カ</button>
            <div class="split-don-container">
                <div id="don-left" class="don-half">ド</div>
                <div id="don-right" class="don-half">ン</div>
            </div>
            <button id="btn-ka-right" class="drum-btn btn-ka-side">カ</button>
        </div>
    </div>

    <div id="resultScreen">
        <div class="result-box">
            <h2>✨ けっかはっぴょう ✨</h2>
            <div id="res-part-name" style="font-size: 16px; color: #aaa;"></div>
            <div id="res-rank" class="result-rank">お囃子の達人</div>
            <div id="res-score" class="result-score">0 点</div>
            
            <div class="result-details">
                <div class="details-row"><span style="color: #ffcc00;">PERFECT!!</span> <span id="res-perfect">0</span></div>
                <div class="details-row"><span style="color: #ff66cc;">GOOD!</span> <span id="res-good">0</span></div>
                <div class="details-row"><span style="color: #33ccff;">BAD</span> <span id="res-bad">0</span></div>
                <div class="details-row"><span style="color: #aaaaaa;">するー(BAD)</span> <span id="res-miss">0</span></div>
                <hr style="border-color: #444;">
                <div class="details-row"><span style="color: #00ffcc;">さいだいコンボ</span> <span id="res-maxcombo">0</span></div>
                <div class="details-row"><span style="color: #fff;">たたいた回数</span> <span id="res-hitcount">0</span></div>
            </div>

            <button class="menu-btn btn-p1" style="width: 100%; margin-bottom: 10px; padding: 10px; font-size: 16px;" onclick="retryGame()">もういちど遊ぶ</button>
            <button class="menu-btn" style="width: 100%; background-color: #555; padding: 10px; font-size: 16px;" onclick="backToTitleFromResult()">メニューへもどる</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let audioCtx = null;
        let audioBuffers = { 1: null, 2: null };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                loadSound(1, 'don.mp3');
                loadSound(2, 'ka.mp3');
            }
        }

        function loadSound(type, url) {
            fetch(url)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                .then(decodedData => { audioBuffers[type] = decodedData; })
                .catch(error => console.error("音声ファイルの読み込みに失敗しました:", error));
        }

        function playTaikoSound(type) {
            initAudio();
            if (!audioCtx) return;

            if (isCountingDown) {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 1) {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                } else {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                }
                return;
            }

            if (!audioBuffers[type]) return;
            const soundSource = audioCtx.createBufferSource();
            soundSource.buffer = audioBuffers[type];
            soundSource.connect(audioCtx.destination);
            soundSource.start(0);
        }

        function openScoreViewer() {
            initAudio();
            document.getElementById("titleScreen").style.display = "none";
            document.getElementById("scoreViewerScreen").style.display = "flex";
        }

        function closeScoreViewer() {
            document.getElementById("scoreViewerScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
        }

        const judgeY = 160; 
        const radius = 30;
        
        let noteSpeed = 4;
        let targetBPM = 70;

        const diffBPMs = { easy: 70, normal: 100, oni: 120 };

        let gameActive = false;
        let animationFrameId = null;

        let judgeText = "";
        let judgeColor = "#fff";
        let judgeTimer = 0;

        let countdownValue = 3;
        let isCountingDown = false;

        let score = 0; let combo = 0; let maxCombo = 0;
        let countPerfect = 0; let countGood = 0; let countBad = 0; let countMiss = 0;
        let totalHitCount = 0; let totalNotesInPart = 0;

        const modeNames = { p1: "パート 1", p2: "パート 2", p3: "パート 3", all: "ぜんぶ通し練習" };
        const diffNames = { easy: "かんたん", normal: "ふつう", oni: "おに" };

        function selectPart(part) {
            initAudio(); 
            currentPart = part;
            
            document.getElementById("titleScreen").style.display = "none";
            document.getElementById("difficultyScreen").style.display = "flex";
            document.getElementById("selected-part-name").innerText = "えらんだパート: " + modeNames[part];
        }

        function backToPartSelect() {
            document.getElementById("difficultyScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
        }

        function selectDifficulty(diff) {
            currentDifficulty = diff;
            targetBPM = diffBPMs[diff] || 100;
            
            if (diff === 'easy') {
                noteSpeed = 6; 
            } else if (diff === 'oni') {
                noteSpeed = 18; 
            } else {
                noteSpeed = 12; 
            }

            document.getElementById("difficultyScreen").style.display = "none";
            startGame();
        }

        function updateScoreImage(partKey) {
            const imgEl = document.getElementById("score-view-img");
            const titleEl = document.getElementById("score-title");
            
            if (partKey === 'p1') {
                imgEl.src = "score1.jpg";
                titleEl.innerText = "楽譜 【P1 - 大太鼓】";
            } else if (partKey === 'p2') {
                imgEl.src = "score2.jpg";
                titleEl.innerText = "楽譜 【P2 - 芸・ほい(中) / 遊び】";
            } else if (partKey === 'p3') {
                imgEl.src = "score3.jpg";
                titleEl.innerText = "楽譜 【P3 - 芸・ほい(外) / 終り】";
            }
        }

        function startGame() {
            gameActive = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            document.getElementById("resultScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "flex";
            
            const titleEl = document.getElementById("playing-title");
            titleEl.innerText = `${modeNames[currentPart]} 【${diffNames[currentDifficulty]}】`;
            
            updateScoreImage(currentPart === 'all' ? 'p1' : currentPart);
            
            score = 0; combo = 0; maxCombo = 0;
            countPerfect = 0; countGood = 0; countBad = 0; countMiss = 0;
            totalHitCount = 0;
            updateHud();
            resetGamePlay();
            
            startCountdown();
        }

        function startCountdown() {
            isCountingDown = true;
            countdownValue = 3;
            setJudge("3", "#ffcc00");
            playTaikoSound(2);

            let timerId = setInterval(() => {
                countdownValue--;
                if (countdownValue === 2) {
                    setJudge("2", "#ffcc00");
                    playTaikoSound(2);
                } else if (countdownValue === 1) {
                    setJudge("1", "#ffcc00");
                    playTaikoSound(2);
                } else if (countdownValue === 0) {
                    setJudge("スタート！", "#00ffcc");
                    playTaikoSound(1);
                    clearInterval(timerId);
                    isCountingDown = false; 
                }
            }, 60000 / targetBPM); 

            gameActive = true;
            gameLoop();
        }

        function setJudge(text, color) {
            judgeText = text; judgeColor = color; judgeTimer = isCountingDown ? 50 : 30;
        }

        function backToTitle() {
            gameActive = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
            notes = [];
            isTransitioning = false;
            isCountingDown = false;
        }

        function backToTitleFromResult() {
            document.getElementById("resultScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
        }

        function retryGame() {
            startGame();
        }

        function getRawNotesForCurrentPart() {
            if (currentPart === 'all') {
                let combined = [];
                let currentOffset = 0;
                const parts = ['p1', 'p2', 'p3'];
                
                parts.forEach(p => {
                    if (songData[p] && songData[p].length > 0) {
                        let base = songData[p][0].x;
                        let maxOffset = 0;
                        
                        const scaleFactor = 500 / partConfig[p].beatInterval;

                        songData[p].forEach(n => {
                            let relativeX = (n.x - base) * scaleFactor;
                            combined.push({
                                x: relativeX + 1240 + currentOffset,
                                type: n.type,
                                text: n.text,
                                parentPart: p
                            });
                            if (relativeX > maxOffset) maxOffset = relativeX;
                        });
                        currentOffset += maxOffset + 600;
                    }
                });
                return combined;
            } else if (songData[currentPart]) {
                return songData[currentPart].map(n => ({...n, parentPart: currentPart}));
            }
            return [];
        }

        function resetGamePlay() {
            const currentRaw = getRawNotesForCurrentPart();
            totalNotesInPart = currentRaw.length;
            isTransitioning = false;
            
            if (currentRaw.length > 0) {
                const firstRawX = currentRaw[0].x;
                notes = currentRaw.map(n => {
                    let relativeDistFromStart = n.x - firstRawX;
                    const partMeta = partConfig[n.parentPart] || { beatInterval: 500 };
                    
                    const oneBeatMs = 60000 / targetBPM; 
                    const framesPerBeat = (oneBeatMs / 1000) * 60; 
                    
                    let frameOffset = (relativeDistFromStart / partMeta.beatInterval) * framesPerBeat;
                    let adjustedX = judgeX + 650 + (frameOffset * noteSpeed);
                    
                    return { 
                        x: adjustedX, 
                        type: n.type, 
                        text: n.text || "",
                        parentPart: n.parentPart
                    };
                });
            } else {
                notes = [];
            }
        }

        function updateHud() {
            document.getElementById("live-score").innerText = score.toLocaleString();
            document.getElementById("live-combo").innerText = combo;
        }

        function showResultScreen() {
            gameActive = false;
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("resultScreen").style.display = "flex";

            document.getElementById("res-part-name").innerText = `${modeNames[currentPart]} （${diffNames[currentDifficulty]}）`;
            document.getElementById("res-score").innerText = score.toLocaleString() + " 点";
            document.getElementById("res-perfect").innerText = countPerfect;
            document.getElementById("res-good").innerText = countGood;
            document.getElementById("res-bad").innerText = countBad;
            document.getElementById("res-miss").innerText = countMiss;
            document.getElementById("res-maxcombo").innerText = maxCombo;
            document.getElementById("res-hitcount").innerText = totalHitCount;

            const rankEl = document.getElementById("res-rank");
            const totalValidHits = countPerfect + countGood;
            
            if (totalNotesInPart > 0) {
                const clearRate = totalValidHits / totalNotesInPart;
                if (clearRate === 1.0) {
                    rankEl.innerText = "✨神（フルコンボ！）✨";
                    rankEl.style.color = "#ffcc00";
                } else if (clearRate >= 0.9) {
                    rankEl.innerText = "囃子の達人 👑";
                    rankEl.style.color = "#ff0054";
                } else if (clearRate >= 0.7) {
                    rankEl.innerText = "囃子の一人前 🌸";
                    rankEl.style.color = "#00ffcc";
                } else {
                    rankEl.innerText = "囃子の見習い 🥚";
                    rankEl.style.color = "#aaaaaa";
                }
            } else {
                rankEl.innerText = "-";
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4; ctx.beginPath();
            ctx.arc(judgeX, judgeY, radius, 0, Math.PI * 2); ctx.stroke();

            if (currentPart === 'all' && notes.length > 0) {
                updateScoreImage(notes[0].parentPart);
            }

            for (let i = 0; i < notes.length; i++) {
                if (!isCountingDown) {
                    notes[i].x -= noteSpeed;
                }
                
                if (notes[i].x < judgeX - 60) {
                    setJudge("BAD...", "#aaaaaa");
                    countMiss++;
                    combo = 0;
                    updateHud();
                    notes.splice(i, 1); i--; continue;
                }
                if (notes[i].x > -50) {
                    ctx.beginPath();
                    ctx.arc(notes[i].x, judgeY, radius, 0, Math.PI * 2);
                    ctx.fillStyle = notes[i].type === 1 ? "#ff4d4d" : "#3399ff";
                    ctx.fill();

                    if (notes[i].text) {
                        ctx.font = "bold 20px sans-serif";
                        ctx.fillStyle = "#ffffff";
                        ctx.shadowBlur = 0;
                        ctx.textAlign = "center";
                        ctx.fillText(notes[i].text, notes[i].x, judgeY - 45);
                    }
                }
            }

            if (notes.length === 0 && !isCountingDown && !isTransitioning) {
                isTransitioning = true;
                setTimeout(() => {
                    showResultScreen();
                }, 2000);
            }

            if (judgeTimer > 0) {
                if (isCountingDown) {
                    ctx.font = "bold 70px sans-serif";
                    ctx.fillStyle = judgeColor; ctx.textAlign = "center";
                    ctx.fillText(judgeText, canvas.width / 2, canvas.height / 2 + 20); 
                } else {
                    ctx.font = "bold 32px sans-serif"; ctx.fillStyle = judgeColor; ctx.textAlign = "center";
                    ctx.fillText(judgeText, canvas.width / 2, 60); 
                }
                judgeTimer--;
            }
            
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function handleComboBonus(basePoints) {
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            score += basePoints + (combo * 10);
            updateHud();
        }

        function hitDrum(type) {
            if (!gameActive || isCountingDown) return; 
            playTaikoSound(type);
            totalHitCount++;

            for (let i = 0; i < notes.length; i++) {
                if (notes[i].type === type) {
                    const diff = Math.abs(notes[i].x - judgeX);
                    const toleranceFactor = Math.max(1, noteSpeed / 12);
                    if (diff <= 20 * toleranceFactor) { 
                        setJudge("PERFECT!!", "#ffcc00"); 
                        countPerfect++;
                        handleComboBonus(1000);
                        notes.splice(i, 1); break; 
                    }
                    else if (diff <= 80 * toleranceFactor) { 
                        setJudge("GOOD!", "#ff66cc"); 
                        countGood++;
                        handleComboBonus(500);
                        notes.splice(i, 1); break; 
                    }
                    else if (diff <= 120 * toleranceFactor) { 
                        setJudge("BAD", "#33ccff"); 
                        countBad++;
                        combo = 0;
                        updateHud();
                        notes.splice(i, 1); break; 
                    }
                }
            }
        }

        function flashElement(el) {
            if (!el) return;
            el.classList.add("active-flash");
            setTimeout(() => {
                el.classList.remove("active-flash");
            }, 80);
        }

        window.addEventListener("keydown", (e) => {
            if (e.repeat) return;
            
            const key = e.key.toLowerCase();
            if (key === "d") { hitDrum(2); flashElement(document.getElementById("btn-ka-left")); }
            if (key === "f") { hitDrum(1); flashElement(document.getElementById("don-left")); }
            if (key === "j") { hitDrum(1); flashElement(document.getElementById("don-right")); }
            if (key === "k") { hitDrum(2); flashElement(document.getElementById("btn-ka-right")); }
        });

        // スマホ操作の最適化：touchstartイベントのみで処理し、遅延と多重発火を防ぐ
        function bindDrumButton(elementId, type) {
            const el = document.getElementById(elementId);
            if (!el) return;

            // スマホ・タブレット用 (最速反応 & 誤反応防止)
            el.addEventListener("touchstart", (e) => {
                e.preventDefault(); // クリックイベントへの変換やズームを完全にブロック
                hitDrum(type);
                flashElement(el);
            }, { passive: false });

            // PCブラウザでのテスト用
            el.addEventListener("mousedown", (e) => {
                // タッチ環境でない場合のみ実行
                if (navigator.maxTouchPoints > 0) return;
                hitDrum(type);
                flashElement(el);
            });
        }

        bindDrumButton("btn-ka-left", 2);
        bindDrumButton("btn-ka-right", 2);
        bindDrumButton("don-left", 1);
        bindDrumButton("don-right", 1);
    </script>
