<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たいこのれんしゅう（カウントダウン版）</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        /* タイトル・難易度画面の共通スタイル */
        .screen-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }
        .menu-title {
            font-size: 36px;
            margin-bottom: 30px;
            color: #ffcc00;
            text-shadow: 2px 2px 4px #ff3300;
        }
        .menu-subtitle {
            font-size: 24px;
            margin-bottom: 25px;
            color: #fff;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }
        .diff-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            width: 100%;
        }
        @media (max-width: 480px) {
            .menu-container {
                grid-template-columns: 1fr;
            }
        }
        .menu-btn {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .btn-p1 { background-color: #e63946; }
        .btn-p2 { background-color: #457b9d; }
        .btn-p3 { background-color: #2a9d8f; }
        .btn-p4 { background-color: #f4a261; }
        .btn-all { background-color: #8338ec; grid-column: span 2; }
        .btn-rec { background-color: #ff0054; grid-column: span 2; }
        @media (max-width: 480px) {
            .btn-all, .btn-rec { grid-column: span 1; }
        }

        /* 難易度ボタンの色 */
        .btn-easy { background-color: #2a9d8f; }
        .btn-normal { background-color: #f4a261; }
        .btn-oni { background-color: #d90429; }

        /* ゲーム画面のスタイル */
        #gameScreen {
            display: none;
            padding-top: 10px;
        }
        #gameCanvas {
            background: #111;
            display: block;
            margin: 15px auto;
            border: 2px solid #fff;
            max-width: 100%;
            width: 95%;
            height: auto;
        }
        .hud-container {
            display: flex;
            justify-content: space-around;
            max-width: 800px;
            margin: 0 auto;
            font-size: 20px;
            font-weight: bold;
        }
        .hud-score { color: #ffcc00; }
        .hud-combo { color: #00ffcc; }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 15px;
        }
        .drum-btn {
            border-radius: 50%;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        #btn-don { 
            background-color: #ff4d4d; 
            width: 140px;
            height: 140px;
            font-size: 32px;
        }
        .btn-ka-side { 
            background-color: #3399ff; 
            width: 85px;
            height: 85px;
            font-size: 20px;
        }
        #output-area {
            margin: 15px auto;
            width: 80%;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #222;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #555;
            box-sizing: border-box;
        }
        .control-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
        }

        /* リザルト画面のスタイル */
        #resultScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }
        .result-box {
            background-color: #111;
            border: 3px solid #ffcc00;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        .result-rank {
            font-size: 32px;
            color: #ff0054;
            font-weight: bold;
            margin: 15px 0;
        }
        .result-score {
            font-size: 40px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .result-details {
            font-size: 18px;
            text-align: left;
            margin: 0 auto 25px auto;
            max-width: 300px;
            line-height: 1.6;
        }
        .details-row {
            display: flex;
            justify-content: space-between;
        }
    </style>

            <button class="menu-btn" style="background-color: #555; margin-top: 10px;" onclick="backToPartSelect()">パートをえらびなおす</button>

    </div>

    <div id="gameScreen">
        <h1 id="playing-title">たいコのれんしゅう</h1>
        
        <div class="hud-container">

        </div>

        <canvas id="gameCanvas" width="800" height="280"></canvas>

        </div>
    </div>

    <div id="resultScreen">
        <div class="result-box">

        </div>

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTaikoSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 1) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

            } else {
                document.getElementById("titleScreen").style.display = "none";
                document.getElementById("difficultyScreen").style.display = "flex";
                document.getElementById("selected-part-name").innerText = "えらんだパート: " + modeNames[part];
            }
        }

        function backToPartSelect() {
            document.getElementById("difficultyScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
        }

        function selectDifficulty(diff) {
            currentDifficulty = diff;
            targetBPM = diffBPMs[diff] || 100;
            
            if (diff === 'easy') {
                noteSpeed = 6; 
            } else if (diff === 'oni') {
                noteSpeed = 18; 
            } else {
                noteSpeed = 12; 
            }

            document.getElementById("difficultyScreen").style.display = "none";
            startGame();
        }

        function startGame() {
            gameActive = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (recordMetronomeId) {
                clearInterval(recordMetronomeId);
                recordMetronomeId = null;
            }

            document.getElementById("resultScreen").style.display = "none";
            document.getElementById("gameScreen").style.display = "block";
            
            const titleEl = document.getElementById("playing-title");
            const instructionEl = document.getElementById("mode-instruction");
            const resetBtn = document.getElementById("reset-rec-btn");
            const outputArea = document.getElementById("output-area");

            if (currentPart === 'rec') {
                isRecordMode = true;
                isCountingDown = false;
                titleEl.innerText = modeNames.rec;
                instructionEl.innerHTML = "リズム通りに叩くと下にコードが自動で作られます";
                resetBtn.style.backgroundColor = "#ff9800";
                resetBtn.style.display = "inline-block";
                outputArea.style.display = "block";
                clearRecordedNotes();
                
                const intervalMs = 60000 / targetBPM; 
                recordMetronomeId = setInterval(() => {
                    if (gameActive && isRecordMode) {
                        playTaikoSound(2); 
                    }
                }, intervalMs);

                gameActive = true;
                gameLoop();
            } else {
                isRecordMode = false;
                titleEl.innerText = `${modeNames[currentPart]} 【${diffNames[currentDifficulty]}】`;
                instructionEl.innerHTML = "F:ドン / J:カッ";
                resetBtn.style.display = "none";
                outputArea.style.display = "none";
                
                score = 0; combo = 0; maxCombo = 0;
                countPerfect = 0; countGood = 0; countBad = 0; countMiss = 0;
                totalHitCount = 0;
                updateHud();
                resetGamePlay();
                
                startCountdown();
            }
        }

        function startCountdown() {
            isCountingDown = true;
            countdownValue = 3;
            setJudge("3", "#ffcc00");
            playTaikoSound(2);

            let timerId = setInterval(() => {
                countdownValue--;
                if (countdownValue === 2) {
                    setJudge("2", "#ffcc00");
                    playTaikoSound(2);
                } else if (countdownValue === 1) {
                    setJudge("1", "#ffcc00");
                    playTaikoSound(2);
                } else if (countdownValue === 0) {
                    setJudge("スタート！", "#00ffcc");
                    playTaikoSound(1);
                    clearInterval(timerId);
                    isCountingDown = false; 
                }
            }, 60000 / targetBPM); 

            gameActive = true;
            gameLoop();
        }

        function setJudge(text, color) {
            judgeText = text; judgeColor = color; judgeTimer = isCountingDown ? 50 : 30;
        }

        function backToTitle() {
            gameActive = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (recordMetronomeId) {
                clearInterval(recordMetronomeId);
                recordMetronomeId = null;
            }
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
            clearRecordedNotes();
            notes = [];
            isTransitioning = false;
            isCountingDown = false;
        }

        function backToTitleFromResult() {
            document.getElementById("resultScreen").style.display = "none";
            document.getElementById("titleScreen").style.display = "flex";
        }

        function retryGame() {
            startGame();
        }

        function getRawNotesForCurrentPart() {
            if (currentPart === 'all') {
                let combined = [];
                let currentOffset = 0;
                const parts = ['p1', 'p2', 'p3', 'p4'];
                
                parts.forEach(p => {
                    if (songData[p] && songData[p].length > 0) {
                        let base = songData[p][0].x;
                        let maxOffset = 0;
                        
                        const scaleFactor = 500 / partConfig[p].beatInterval;

                        songData[p].forEach(n => {
                            let relativeX = (n.x - base) * scaleFactor;
                            combined.push({
                                x: relativeX + 1240 + currentOffset,
                                type: n.type,
                                text: n.text,
                                parentPart: p
                            });
                            if (relativeX > maxOffset) maxOffset = relativeX;
                        });
                        currentOffset += maxOffset + 600;
                    }
                });
                return combined;
            } else if (songData[currentPart]) {
                return songData[currentPart].map(n => ({...n, parentPart: currentPart}));
            }
            return [];
        }

        function resetGamePlay() {
            const currentRaw = getRawNotesForCurrentPart();
            totalNotesInPart = currentRaw.length;
            isTransitioning = false;
            
            if (currentRaw.length > 0) {
                const firstRawX = currentRaw[0].x;
                notes = currentRaw.map(n => {
                    let relativeDistFromStart = n.x - firstRawX;
                    const partMeta = partConfig[n.parentPart] || { beatInterval: 500 };
                    
                    const oneBeatMs = 60000 / targetBPM; 
                    const framesPerBeat = (oneBeatMs / 1000) * 60; 
                    
                    let frameOffset = (relativeDistFromStart / partMeta.beatInterval) * framesPerBeat;
                    let adjustedX = judgeX + 650 + (frameOffset * noteSpeed);
                    
                    return { 
                        x: adjustedX, 
                        type: n.type, 
                        text: n.text || "" 
                    };
                });
            } else {
                notes = [];
            }
        }

        function updateHud() {
            document.getElementById("live-score").innerText = score.toLocaleString();
            document.getElementById("live-combo").innerText = combo;
        }

        function showResultScreen() {
            gameActive = false;
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("resultScreen").style.display = "flex";

            document.getElementById("res-part-name").innerText = `${modeNames[currentPart]} （${diffNames[currentDifficulty]}）`;
            document.getElementById("res-score").innerText = score.toLocaleString() + " 点";
            document.getElementById("res-perfect").innerText = countPerfect;
            document.getElementById("res-good").innerText = countGood;
            document.getElementById("res-bad").innerText = countBad;
            document.getElementById("res-miss").innerText = countMiss;
            document.getElementById("res-maxcombo").innerText = maxCombo;
            document.getElementById("res-hitcount").innerText = totalHitCount;

            const rankEl = document.getElementById("res-rank");
            const totalValidHits = countPerfect + countGood;
            
            if (totalNotesInPart > 0) {
                const clearRate = totalValidHits / totalNotesInPart;
                if (clearRate === 1.0) {
                    rankEl.innerText = "✨神（フルコンボ！）✨";
                    rankEl.style.color = "#ffcc00";
                } else if (clearRate >= 0.9) {
                    rankEl.innerText = "囃子の達人 👑";
                    rankEl.style.color = "#ff0054";
                } else if (clearRate >= 0.7) {
                    rankEl.innerText = "囃子の一人前 🌸";
                    rankEl.style.color = "#00ffcc";
                } else {
                    rankEl.innerText = "囃子の見習い 🥚";
                    rankEl.style.color = "#aaaaaa";
                }
            } else {
                rankEl.innerText = "-";
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4; ctx.beginPath();
            ctx.arc(judgeX, judgeY, radius, 0, Math.PI * 2); ctx.stroke();

            if (isRecordMode) {
                timelineCounter += noteSpeed;
                for (let rn of recordedNotes) {
                    let currentX = rn.x - (timelineCounter - 800);
                    if (currentX > -50 && currentX < 9999) { 
                        ctx.beginPath();
                        ctx.arc(currentX, judgeY, radius, 0, Math.PI * 2);
                        ctx.fillStyle = rn.type === 1 ? "#ff4d4d" : "#3399ff";
                        ctx.fill();

                        if (rn.text) {
                            ctx.font = "bold 20px sans-serif";
                            ctx.fillStyle = "#ffffff";
                            ctx.textAlign = "center";
                            ctx.fillText(rn.text, currentX, judgeY - 45);
                        }
                    }
                }
            } else {
                for (let i = 0; i < notes.length; i++) {
                    if (!isCountingDown) {
                        notes[i].x -= noteSpeed;
                    }
                    
                    if (notes[i].x < judgeX - 60) {
                        setJudge("BAD...", "#aaaaaa");
                        countMiss++;
                        combo = 0;
                        updateHud();
                        notes.splice(i, 1); i--; continue;
                    }
                    if (notes[i].x > -50) {
                        ctx.beginPath();
                        ctx.arc(notes[i].x, judgeY, radius, 0, Math.PI * 2);
                        ctx.fillStyle = notes[i].type === 1 ? "#ff4d4d" : "#3399ff";
                        ctx.fill();

                        if (notes[i].text) {
                            ctx.font = "bold 20px sans-serif";
                            ctx.fillStyle = "#ffffff";
                            ctx.textAlign = "center";
                            ctx.fillText(notes[i].text, notes[i].x, judgeY - 45);
                        }
                    }
                }

                if (notes.length === 0 && !isCountingDown && !isTransitioning) {
                    isTransitioning = true;
                    setTimeout(() => {
                        showResultScreen();
                    }, 2000);
                }
            }

            if (judgeTimer > 0) {
                if (isCountingDown) {
                    ctx.font = "bold 70px sans-serif";
                    ctx.fillStyle = judgeColor; ctx.textAlign = "center";
                    ctx.fillText(judgeText, canvas.width / 2, canvas.height / 2 + 20); 
                } else {
                    ctx.font = "bold 32px sans-serif"; ctx.fillStyle = judgeColor; ctx.textAlign = "center";
                    ctx.fillText(judgeText, canvas.width / 2, 60); 
                }
                judgeTimer--;
            }
            
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function clearRecordedNotes() {
            recordedNotes = [];
            timelineCounter = 800;
            document.getElementById("output-code").value = "";
            setJudge("RESET", "#fff");
        }

        function handleComboBonus(basePoints) {
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            score += basePoints + (combo * 10);
            updateHud();
        }

        function hitDrum(type) {
            if (!gameActive || isCountingDown) return; 
            playTaikoSound(type);
            totalHitCount++;

            if (isRecordMode) {
                const noteText = type === 1 ? "トン" : "カッ";
                recordedNotes.push({ x: timelineCounter, type: type, text: noteText });
                updateOutputCode();
                setJudge(type === 1 ? "ドン(記録)" : "カッ(記録)", "#0f0");
            } else {
                for (let i = 0; i < notes.length; i++) {
                    if (notes[i].type === type) {
                        const diff = Math.abs(notes[i].x - judgeX);
                        const toleranceFactor = Math.max(1, noteSpeed / 12);
                        if (diff <= 20 * toleranceFactor) { 
                            setJudge("PERFECT!!", "#ffcc00"); 
                            countPerfect++;
                            handleComboBonus(1000);
                            notes.splice(i, 1); break; 
                        }
                        else if (diff <= 60 * toleranceFactor) { 
                            setJudge("GOOD!", "#ff66cc"); 
                            countGood++;
                            handleComboBonus(500);
                            notes.splice(i, 1); break; 
                        }
                        else if (diff <= 80 * toleranceFactor) { 
                            setJudge("BAD", "#33ccff"); 
                            countBad++;
                            combo = 0;
                            updateHud();
                            notes.splice(i, 1); break; 
                        }
                    }
                }
            }
        }

        function updateOutputCode() {
            let codeString = "[\n";
            recordedNotes.forEach((n, idx) => {
                codeString += `    { x: ${n.x}, type: ${n.type}, text: "${n.text}" }${idx < recordedNotes.length - 1 ? ',' : ''}\n`;
            });
            codeString += "]";
            document.getElementById("output-code").value = codeString;
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "f" || e.key === "F") hitDrum(1);
            if (e.key === "j" || e.key === "J") hitDrum(2);
        });

        document.getElementById("btn-don").addEventListener("touchstart", (e) => { e.preventDefault(); hitDrum(1); });
        document.getElementById("btn-ka-left").addEventListener("touchstart", (e) => { e.preventDefault(); hitDrum(2); });
        document.getElementById("btn-ka-right").addEventListener("touchstart", (e) => { e.preventDefault(); hitDrum(2); });
        
        document.getElementById("btn-don").addEventListener("mousedown", () => hitDrum(1));
        document.getElementById("btn-ka-left").addEventListener("mousedown", () => hitDrum(2));
        document.getElementById("btn-ka-right").addEventListener("mousedown", () => hitDrum(2));
    </script>
</body>
</html>
